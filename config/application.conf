# Root config file, mirroring survivor-game's layout: a thin root that pulls in
# the individual game config files via HOCON `include`. The config watcher
# (scala/src/main/scala/game/config) loads ONLY this file; the Scala-Native HOCON
# backend behind the pureconfig fork (the SHocon shim) now resolves the `include`
# directives AND the `${...}` substitutions itself — add a config file here and it
# is picked up with no Scala change.
#
# max_health.conf is included first so its values are present in the merged tree
# before player.conf / enemy.conf reference them via `${max-health.*}`.
include required("game/max_health.conf")
include required("game/player.conf")
include required("game/enemy.conf")
include required("game/spawner.conf")
