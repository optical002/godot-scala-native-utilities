# Player tuning. Edit any value while the game runs and the watcher will log
# exactly which player.* fields changed.
#
# `max-health` is pulled from the shared max_health.conf via a HOCON substitution
# (resolved by pureconfig after all includes are merged), so player and enemy
# health come from one source of truth.
player {
  movement-speed: 200.0
  max-health: ${max-health.player}
  auto-aim: true
}
