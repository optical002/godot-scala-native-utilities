# Shared max-health tuning. player.conf and enemy.conf reference these values via
# HOCON substitutions (`${max-health.player}` / `${max-health.enemy}`), so the two
# entities stay in sync from one place. This file is pulled in by application.conf
# BEFORE player.conf / enemy.conf, so the values are already in the merged tree when
# those substitutions resolve.
max-health {
  player: 100.0
  enemy: 30.0
}
